            phaseFinal: "Результат"
        },
        en: {
            gameTitle: "Stop! Don't let yourself be deceived",
            intro: [
                { title: "🚨 Be careful!", text: "Scammers online try to involve teens in crimes. Our game teaches you to recognize these schemes." },

            ],

                { type: "system", text: "✅ Correct! Never comply with such demands." }
            ],
            scenarios: [
                { title: "1. 🔥 Call from 'investigator'", msg: "'Policeman': Your friend is in terrorism. Set the ATM on fire.", opts: ["Run with a lighter", "Demand a meeting at police station and tell parents", "Transfer money"], correctIdx: 1, explain: "✅ Real investigator wouldn't ask a teen to commit arson.", wrongExpl: ["❌ Up to 20 years.", "❌ Scammer continues."] },
                { title: "2. 💔 'Girl' from social media", msg: "Pretty girl: Set a gas station on fire, get 30k rub and a date. Don't tell anyone!", opts: ["Agree", "Offer real meeting, if refused – block and tell parents", "Ask for intimate photos"], correctIdx: 1, explain: "✅ Scammer won't agree to a meeting.", wrongExpl: ["❌ Teens were arrested.", "❌ Photos used for blackmail."] },
                { title: "3. 💰 Easy money", msg: "Ad: Throw a Molotov cocktail at an ATM – get 50k rub instantly.", opts: ["Agree", "Ignore, block, report", "Ask for 50% prepayment"], correctIdx: 1, explain: "✅ Didn't fall for easy money.", wrongExpl: ["❌ Article 205 – up to 20 years.", "❌ Can't fool criminals."] },
                { title: "4. 😨 Threat to loved ones", msg: "Stranger: Set the ATM on fire by 7 PM or we'll kill your mother. Don't call anyone!", opts: ["Panic and run", "Immediately call mom, then police 102", "Ask for proof"], correctIdx: 1, explain: "✅ 99% threats are fake.", wrongExpl: ["❌ You'll commit terrorism.", "❌ Discussing gives leverage."] },
                { title: "5. 📞 Call from 'bank'", msg: "Your card is blocked. Give us your CVV code to reissue.", opts: ["Give CVV", "Hang up and call the bank using the number on your card", "Transfer money"], correctIdx: 1, explain: "✅ Bank never asks for CVV.", wrongExpl: ["❌ Data stolen.", "❌ Money taken."] },
                { title: "6. 💻 Link from friend", msg: "Friend sent a link: 'Get free iPhones'. Friend writes strangely.", opts: ["Click immediately", "Ask personally, don't click", "Share with everyone"], correctIdx: 1, explain: "✅ Friend's account hacked.", wrongExpl: ["❌ Your account hacked.", "❌ Phishing."] },
                { title: "7. 🎁 Contest win", msg: "You won iPhone 16. Pay 500 rub for delivery.", opts: ["Pay", "Ignore – scam", "Transfer 500 rub"], correctIdx: 1, explain: "✅ Real contests don't ask for prepayment.", wrongExpl: ["❌ Money lost.", "❌ Scammer asks for more."] },
                { title: "8. 🚔 Fake traffic police", msg: "You violated traffic rules. Pay 5000 rub, otherwise lose license.", opts: ["Pay", "Check through official portal, don't pay strangers", "Call police"], correctIdx: 1, explain: "✅ Fines aren't paid to personal cards.", wrongExpl: ["❌ Lose money.", "❌ Scammer uses fear."] },
                { title: "9. 🏦 Job offer from 'employer'", msg: "Make a drug stash, get 100k rub.", opts: ["Agree", "Refuse, tell parents and police 102", "Ask details"], correctIdx: 1, explain: "✅ Drugs = prison sentence.", wrongExpl: ["❌ Article 228 – up to 20 years.", "❌ You'll join a gang."] },
                { title: "10. 💬 Help request", msg: "My child is in hospital, need 5000 rub. I'll return tomorrow.", opts: ["Transfer", "Don't transfer, suggest social services", "Transfer half"], correctIdx: 1, explain: "✅ Common pity scam.", wrongExpl: ["❌ Money lost.", "❌ Scammer will not return."] },
                { title: "11. 🔐 Account hack", msg: "Someone is trying to access your email. Click the link to confirm.", opts: ["Click", "Don't click, check email directly", "Enter password on site"], correctIdx: 1, explain: "✅ Phishing link will steal password.", wrongExpl: ["❌ Lose account.", "❌ Data stolen."] },
                { title: "12. 📦 Suspicious parcel", msg: "SMS: Your parcel is delayed. Pay 300 rub via link to receive.", opts: ["Pay", "Don't click, check with official carrier", "Send money to card"], correctIdx: 1, explain: "✅ If you didn't order anything – it's a scam.", wrongExpl: ["❌ They will drain your card.", "❌ Steal your data."] },
                { title: "13. 💣 'Safe account'", msg: "Call: Your money is being stolen. Transfer to a safe account...", opts: ["Transfer", "Hang up – it's a scam", "Tell your password"], correctIdx: 1, explain: "✅ Safe accounts don't exist.", wrongExpl: ["❌ Lose all savings.", "❌ Card data stolen."] },
                { title: "14. 📱 SMS code", msg: "Stranger: 'I mistakenly sent you money, return it. Tell me the SMS code to confirm.'", opts: ["Give code", "Don't give code – it's a scam", "Transfer money immediately"], correctIdx: 1, explain: "✅ Never share SMS codes!", wrongExpl: ["❌ All money will be stolen.", "❌ They'll access your account."] }
            ],
            manipulations: [
                { q: "Set ATM on fire or your friend will be imprisoned.", opts: ["Fear & guilt", "Easy money", "Physical threat"], correctIdx: 0, exp: "Fear pressure." },
                { q: "Don't tell anyone, it's a secret operation.", opts: ["Isolation", "Blackmail", "Flattery"], correctIdx: 0, exp: "Isolation – red flag." },
                { q: "Do this, we'll become friends and you'll get money.", opts: ["Promise of money & friendship", "Threat", "Intimidation"], correctIdx: 0, exp: "Gain trust." },
                { q: "Correct action for suspicious offer?", opts: ["Agree", "Screenshot, block, tell adults", "Delete conversation"], correctIdx: 1, exp: "Screenshot is evidence." },
                { q: "Send money to free friend from police.", opts: ["Real help", "Fraud", "Charity"], correctIdx: 1, exp: "Fake story." },
                { q: "Blogger link: click and get a prize.", opts: ["Click", "Ignore, verify via official account", "Share"], correctIdx: 1, exp: "Phishing." },
                { q: "If you don't help, your family will suffer.", opts: ["Blackmail", "Help", "Ad"], correctIdx: 0, exp: "Pure blackmail." },
                { q: "Only you can do this, you are a hero.", opts: ["Flattery", "Money", "Isolation"], correctIdx: 0, exp: "Pressure on pride." },
                { q: "It will take just a minute, nothing bad.", opts: ["Downplaying danger", "Threat", "Blackmail"], correctIdx: 0, exp: "Minimizing risk." },
                { q: "All your friends already agreed.", opts: ["Peer pressure", "Flattery", "Threat"], correctIdx: 0, exp: "Herd mentality." },
                { q: "Transfer money and I'll return double.", opts: ["Pyramid scheme", "Real earnings", "Help"], correctIdx: 0, exp: "Too good to be true." },
                { q: "Transfer 5000 rub or we'll publish your private photos.", opts: ["Extortion", "Request", "Ad"], correctIdx: 0, exp: "Direct extortion – call police!" },
                { q: "You won a prize, but pay 1000 rub for delivery.", opts: ["Scam", "Real prize", "Charity"], correctIdx: 0, exp: "Never pay to receive a prize." },
                { q: "Help transfer money – there's 1 million, you get 100k.", opts: ["Money laundering (complicity)", "Real job", "Charity"], correctIdx: 0, exp: "You become an accomplice." },
                { q: "Your photos leaked. Pay 10,000 rub to remove them.", opts: ["Blackmail", "Warning", "Help"], correctIdx: 0, exp: "Don't pay, report to police." },
                { q: "I'm in trouble, send whatever you can.", opts: ["Pity scam", "Real help", "Friend request"], correctIdx: 0, exp: "Don't send money to strangers." }
            ],
            finalPerfect: "🎉 Perfect! You never got deceived!",
            finalGood: "👍 Good! Be more careful.",
            finalBad: "📚 Try again. Don't be deceived!",
            restartBtn: "🔄 Play again",
            nextBtn: "➡ Next",
            demoNext: "Next →",
            phaseIntro: "Intro",
            phaseDemo: "Dialogue",
            phaseGame: "Situation",
            phasePractice: "Manipulations",
            phaseFinal: "Result"
        }
    };

    let currentLang = "ru";
    let gameState = {
        phase: "intro",
        introIdx: 0,
        demoStep: 0,
        gameIdx: 0,
        practiceIdx: 0,
        score: 0,
        maxScore: 30,
        gameAnswered: false,
        gameChoicesShuffled: [],
        practiceChoicesShuffled: [],
        practiceAnswers: []
    };

    const contentDiv = document.getElementById("dynamicContent");
    const scoreSpan = document.getElementById("scoreValue");
    const maxScoreSpan = document.getElementById("maxScoreSpan");
    const phaseLabelSpan = document.getElementById("phaseLabel");
    const qCurrentSpan = document.getElementById("qCurrent");
    const qTotalSpan = document.getElementById("qTotal");
    const gameTitleElem = document.getElementById("gameMainTitle");

    function updateUI() {
        scoreSpan.innerText = gameState.score;
        maxScoreSpan.innerText = gameState.maxScore;
        if (gameState.phase === "intro") {
            phaseLabelSpan.innerText = langData[currentLang].phaseIntro;
            qTotalSpan.innerText = langData[currentLang].intro.length;
            qCurrentSpan.innerText = gameState.introIdx+1;
        } else if (gameState.phase === "demo") {
            phaseLabelSpan.innerText = langData[currentLang].phaseDemo;
            qTotalSpan.innerText = langData[currentLang].demo.length;
            qCurrentSpan.innerText = gameState.demoStep+1;
        } else if (gameState.phase === "game") {
            phaseLabelSpan.innerText = langData[currentLang].phaseGame;
            qTotalSpan.innerText = langData[currentLang].scenarios.length;
            qCurrentSpan.innerText = gameState.gameIdx+1;
        } else if (gameState.phase === "practice") {
            phaseLabelSpan.innerText = langData[currentLang].phasePractice;
            qTotalSpan.innerText = langData[currentLang].manipulations.length;
            qCurrentSpan.innerText = gameState.practiceIdx+1;
        } else {
            phaseLabelSpan.innerText = langData[currentLang].phaseFinal;
            qTotalSpan.innerText = "?";
        }
    }

    function shuffleWithMapping(originalOpts, correctOriginalIdx) {
        let items = originalOpts.map((text, idx) => ({ text, originalIdx: idx }));
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        return { shuffledTexts: items.map(i => i.text), newCorrectIdx: items.findIndex(i => i.originalIdx === correctOriginalIdx) };
    }

    function prepareShuffledData() {
        const scenarios = langData[currentLang].scenarios;
        const mans = langData[currentLang].manipulations;
        gameState.gameChoicesShuffled = scenarios.map(s => shuffleWithMapping(s.opts, s.correctIdx));
        gameState.practiceChoicesShuffled = mans.map(m => shuffleWithMapping(m.opts, m.correctIdx));
    }

    function render() {
        if (gameState.phase === "intro") renderIntro();
        else if (gameState.phase === "demo") renderDemo();
        else if (gameState.phase === "game") renderScenario();
        else if (gameState.phase === "practice") renderManipulation();
        else renderFinal();
        updateUI();
    }

    function renderIntro() {
        const introArr = langData[currentLang].intro;
        if (gameState.introIdx >= introArr.length) {
            gameState.phase = "demo";
            gameState.demoStep = 0;
            render();
            return;
        }
        const slide = introArr[gameState.introIdx];
        let html = `<div class="intro-slide"><h2>${slide.title}</h2><p>${slide.text}</p>`;
        if (slide.list) html += `<ul>${slide.list.map(li => `<li>• ${li}</li>`).join('')}</ul>`;
        html += `<button class="next-btn" id="introNext">${langData[currentLang].nextBtn}</button></div>`;
        contentDiv.innerHTML = html;
        document.getElementById("introNext")?.addEventListener("click", () => { gameState.introIdx++; render(); });
    }

    function renderDemo() {
        const demoArr = langData[currentLang].demo;
        if (gameState.demoStep >= demoArr.length) {
            gameState.phase = "game";
            gameState.gameIdx = 0;
            gameState.gameAnswered = false;
            prepareShuffledData();
            render();
            return;
        }
        let chatHtml = `<div class="intro-slide"><h2>📱 Разбор диалога</h2><div class="chat-window">`;
        for (let i = 0; i <= gameState.demoStep; i++) {
            let msg = demoArr[i];
            if (msg.type === "left") chatHtml += `<div class="message message-left">${msg.text}</div>`;
            else if (msg.type === "right") chatHtml += `<div class="message message-right">${msg.text}</div>`;
            else chatHtml += `<div class="system-message">${msg.text}</div>`;
        }
        chatHtml += `</div><div class="chat-controls"><button class="chat-next-btn" id="demoNext">${langData[currentLang].demoNext}</button></div></div>`;
        contentDiv.innerHTML = chatHtml;
        document.getElementById("demoNext")?.addEventListener("click", () => { gameState.demoStep++; render(); });
    }

    function renderScenario() {
        const scenarios = langData[currentLang].scenarios;
        if (gameState.gameIdx >= scenarios.length) {
            gameState.phase = "practice";
            gameState.practiceIdx = 0;
            gameState.practiceAnswers = new Array(scenarios.length).fill(undefined);
            render();
            return;
        }
        const sc = scenarios[gameState.gameIdx];
        const shuffled = gameState.gameChoicesShuffled[gameState.gameIdx];
        const answered = gameState.gameAnswered !== false;
        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (gameState.gameAnswered === shuffled.newCorrectIdx);
            if (isCorrect) { gameState.score++; feedbackHtml = `<div class="feedback" style="border-left-color:#2ecc71;">${sc.explain}</div>`; }
            else { feedbackHtml = `<div class="feedback" style="border-left-color:#e74c3c;">${sc.wrongExpl[gameState.gameAnswered] || "❌ Неверно. " + sc.explain}</div>`; }
        }
        let optsHtml = `<div class="options">${shuffled.shuffledTexts.map((opt, idx) => `<button class="option-btn" data-opt="${idx}" ${answered ? "disabled" : ""}>${opt}</button>`).join('')}</div>`;
        let nextBtn = answered ? `<button class="next-btn" id="nextTaskBtn">${langData[currentLang].nextBtn}</button>` : "";
        let html = `<div class="scenario"><h2>${sc.title}</h2><div class="message-text">📨 ${sc.msg}</div>${optsHtml}${feedbackHtml}${nextBtn}</div>`;
        contentDiv.innerHTML = html;
        if (!answered) {
            document.querySelectorAll(".option-btn").forEach(btn => btn.addEventListener("click", (e) => {
                if (gameState.gameAnswered !== false) return;
                gameState.gameAnswered = parseInt(btn.dataset.opt);
                render();
            }));
        } else {
            document.getElementById("nextTaskBtn")?.addEventListener("click", () => {
                gameState.gameIdx++;
                gameState.gameAnswered = false;
                render();
            });
        }
    }

    function renderManipulation() {
        const manipulations = langData[currentLang].manipulations;
        if (gameState.practiceIdx >= manipulations.length) {
            gameState.phase = "final";
            render();
            return;
        }
        const mn = manipulations[gameState.practiceIdx];
        const shuffled = gameState.practiceChoicesShuffled[gameState.practiceIdx];
        const answered = gameState.practiceAnswers[gameState.practiceIdx] !== undefined;
        let feedbackHtml = "";
        if (answered) {
            const isCorrect = gameState.practiceAnswers[gameState.practiceIdx];
            if (isCorrect) { gameState.score++; feedbackHtml = `<div class="feedback" style="border-left-color:#2ecc71;">✅ ${mn.exp}</div>`; }
            else { feedbackHtml = `<div class="feedback" style="border-left-color:#e74c3c;">❌ Неверно. ${mn.exp}</div>`; }
        }
        let optsHtml = `<div class="manipulation-options">${shuffled.shuffledTexts.map((opt, idx) => `<button class="manip-btn" data-man="${idx}" ${answered ? "disabled" : ""}>${opt}</button>`).join('')}</div>`;
        let nextBtn = answered ? `<button class="next-btn" id="nextManipBtn">${langData[currentLang].nextBtn}</button>` : "";
        let html = `<div class="manipulation-card"><div class="manipulation-question">${mn.q}</div>${optsHtml}${feedbackHtml}${nextBtn}</div>`;
        contentDiv.innerHTML = html;
        if (!answered) {
            document.querySelectorAll(".manip-btn").forEach(btn => btn.addEventListener("click", (e) => {
                let choice = parseInt(btn.dataset.man);
                gameState.practiceAnswers[gameState.practiceIdx] = (choice === shuffled.newCorrectIdx);
                render();
            }));
        } else {
            document.getElementById("nextManipBtn")?.addEventListener("click", () => {
                gameState.practiceIdx++;
                render();
            });
        }
    }

    function renderFinal() {
        let msg = "";
        if (gameState.score === gameState.maxScore) msg = langData[currentLang].finalPerfect;
        else if (gameState.score >= 20) msg = langData[currentLang].finalGood;
        else msg = langData[currentLang].finalBad;
        let html = `<div class="final-screen">
            <h2>🏆 ${langData[currentLang].phaseFinal}</h2>
            <div class="final-score">${gameState.score} / ${gameState.maxScore}</div>
            <p>${msg}</p>
            <div class="bright-rules">
                <p>📌 Главные правила безопасности:</p>
                <p>• Не доверяй незнакомцам в интернете</p>
                <p>• При угрозах или странных просьбах — сразу сообщи родителям</p>
                <p>• Звони 102 — полиция поможет</p>
                <p>• Делай скриншоты переписки</p>
            </div>
            <button class="restart-btn" id="restartGame">${langData[currentLang].restartBtn}</button>
        </div>`;
        contentDiv.innerHTML = html;
        document.getElementById("restartGame")?.addEventListener("click", () => resetGame());
    }

    function resetGame() {
        gameState = {
            phase: "intro", introIdx: 0, demoStep: 0, gameIdx: 0, practiceIdx: 0,
            score: 0, maxScore: 30, gameAnswered: false,
            gameChoicesShuffled: [], practiceChoicesShuffled: [], practiceAnswers: []
        };
        render();
    }

    function blockTouchMove(e) {
        e.preventDefault();
    }

    function initSDK() {
        // Дополнительная блокировка прокрутки на всём контейнере
        const container = document.getElementById("gameRoot");
        container.addEventListener("touchmove", blockTouchMove, { passive: false });
        document.body.addEventListener("touchmove", blockTouchMove, { passive: false });

        if (typeof YaGames !== "undefined") {
            YaGames.init().then(ysdk => {
                window.ysdk = ysdk;
                ysdk.features.LoadingAPI?.ready();
                const env = ysdk.getEnvironment();
                if (env?.i18n?.lang === "en") currentLang = "en";
                else currentLang = "ru";
                gameTitleElem.innerText = langData[currentLang].gameTitle;
                if (ysdk.features && ysdk.features.GameReadyAPI) {
                    ysdk.features.GameReadyAPI.gameReady();
                }
                render();
            }).catch(err => {
                console.warn("SDK error", err);
                render();
            });
        } else {
            render();
        }
    }

    initSDK();
</script>

</html>
