<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Птицы | тренажёр | 1–2 класс</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #cfe3dc;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fffef7;
            border-radius: 64px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            background: #7fa87f;
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.5rem;
            color: #fff3e0;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #fef3da;
            padding: 12px 25px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #7fa87f;
            border-bottom: 3px solid #c9b68b;
        }
        .score-box, .question-counter {
            background: #ffffff;
            padding: 5px 18px;
            border-radius: 60px;
        }
        .content {
            padding: 25px;
        }
        .intro-slide {
            background: #fffaf0;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
        }
        .intro-slide h2 {
            font-size: 1.6rem;
            color: #7fa87f;
            margin-bottom: 20px;
        }
        .intro-slide p {
            font-size: 1.2rem;
            color: #2c3e2e;
            margin-bottom: 20px;
        }
        .task-card {
            background: #fffaf0;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
        }
        .task-question {
            font-size: 1.4rem;
            font-weight: bold;
            margin: 20px 0;
            color: #b45f1b;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        .opt-btn {
            background: #7fa87f;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 4px 0 #3a6b4a;
            color: white;
            min-width: 110px;
            transition: 0.05s linear;
        }
        .opt-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3a6b4a;
        }
        .opt-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: default;
        }
        .feedback {
            margin-top: 20px;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
        }
        .correct-feedback {
            background: #d9f0da;
            color: #1e5a2a;
            border-left: 8px solid #2e7d32;
        }
        .wrong-feedback {
            background: #ffe0e0;
            color: #a1131e;
            border-left: 8px solid #d32f2f;
        }
        .next-btn {
            background: #f4a261;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 0 #c45c2c;
        }
        .final-screen {
            background: #fffaf0;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
        }
        .final-screen h2 {
            font-size: 1.6rem;
            color: #7fa87f;
        }
        .final-score {
            font-size: 2rem;
            font-weight: bold;
            margin: 20px 0;
            color: #1e5a2a;
            background: #fef3da;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
        }
        .restart-btn {
            background: #7fa87f;
            border: none;
            padding: 12px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            color: white;
            width: 100%;
        }
        .copyright {
            text-align: center;
            font-size: 0.7rem;
            padding: 12px;
            background: #fef3da;
            color: #aac7be;
        }
        @media (max-width: 550px) {
            .task-question { font-size: 1.2rem; }
            .opt-btn { font-size: 1rem; padding: 8px 15px; min-width: 90px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div class="header">
        <h1>Птицы: тренажёр для 1–2 класса</h1>
    </div>
    <div class="stats">
        <div class="score-box">⭐ очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 <span id="phaseInfo">вступление</span></div>
    </div>
    <div class="content" id="mainContent"></div>
    <div class="copyright">
        окружающий мир · интерактивный тренажёр
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // ВОПРОСЫ ПО ТЕМЕ "ПТИЦЫ" (1-2 КЛАСС)
    // Все ответы написаны строчными буквами
    // --------------------------------------------------------------
    const tasks = [
        { q: "какая птица умеет подражать голосам других птиц и даже человеческой речи?", opts: ["воробей", "скворец", "сорока"], correct: "скворец", hint: "скворцы – отличные пересмешники." },
        { q: "какая птица самая маленькая в мире?", opts: ["колибри", "синица", "воробей"], correct: "колибри", hint: "колибри весит всего несколько граммов." },
        { q: "какая птица не умеет летать, но быстро плавает?", opts: ["пингвин", "страус", "чайка"], correct: "пингвин", hint: "пингвины – замечательные пловцы." },
        { q: "какую птицу называют «лесным доктором»?", opts: ["дятел", "кукушка", "соловей"], correct: "дятел", hint: "дятел лечит деревья, выедая жучков." },
        { q: "какая птица прилетает весной первой?", opts: ["грач", "ласточка", "стриж"], correct: "грач", hint: "грачи открывают весну." },
        { q: "какая птица живёт в Антарктиде?", opts: ["пингвин", "альбатрос", "полярная сова"], correct: "пингвин", hint: "пингвины обитают в Антарктиде." },
        { q: "какая птица мечет яйца в чужие гнёзда?", opts: ["кукушка", "ворона", "сорока"], correct: "кукушка", hint: "кукушка подкладывает яйца другим птицам." },
        { q: "какая птица носит название фрукта?", opts: ["киви", "апельсин", "банан"], correct: "киви", hint: "птица киви названа в честь одноимённого плода." }
    ];

    let currentTask = 0;
    let totalScore = 0;
    let answersState = [];
    const totalTasks = tasks.length;

    const contentDiv = document.getElementById('mainContent');
    const scoreSpan = document.getElementById('scoreValue');
    const phaseInfoSpan = document.getElementById('phaseInfo');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        if (currentTask < totalTasks) {
            phaseInfoSpan.innerText = `задание ${currentTask+1} из ${totalTasks}`;
        } else {
            phaseInfoSpan.innerText = `результат`;
        }
    }

    function render() {
        if (currentTask < totalTasks) {
            renderTask(currentTask);
        } else {
            showFinalScreen();
        }
    }

    function renderTask(idx) {
        const task = tasks[idx];
        const alreadyAnswered = answersState[idx] !== undefined;
        let feedbackHtml = '';
        let disabled = false;

        if (alreadyAnswered) {
            const isCorrect = answersState[idx];
            disabled = true;
            feedbackHtml = `
                <div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
                    ${isCorrect ? '✅ верно! ' + task.hint : '❌ неверно. ' + task.hint}
                </div>
            `;
        }

        let optionsHtml = `<div class="options">`;
        for (let opt of task.opts) {
            optionsHtml += `<button class="opt-btn" data-opt="${opt}" ${disabled ? 'disabled' : ''}>${opt}</button>`;
        }
        optionsHtml += `</div>`;

        let nextButtonHtml = '';
        if (alreadyAnswered) {
            nextButtonHtml = `<button class="next-btn" id="nextTaskBtn">➡ дальше</button>`;
        }

        const html = `
            <div class="task-card">
                <div class="task-question">${task.q}</div>
                ${optionsHtml}
                ${feedbackHtml}
                ${nextButtonHtml}
            </div>
        `;
        contentDiv.innerHTML = html;

        if (!alreadyAnswered) {
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answersState[idx] !== undefined) return;
                    const chosen = btn.getAttribute('data-opt');
                    const isCorrect = (chosen === task.correct);
                    answersState[idx] = isCorrect;
                    if (isCorrect) {
                        totalScore++;
                        updateUI();
                    }
                    renderTask(idx);
                });
            });
        } else {
            const nextBtn = document.getElementById('nextTaskBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    currentTask++;
                    render();
                    updateUI();
                });
            }
        }
        updateUI();
    }

    function showFinalScreen() {
        const maxScore = totalTasks;
        const earned = totalScore;
        let message = '';
        if (earned === maxScore) {
            message = '🎉 Молодец! Ты отлично знаешь птиц! 🎉';
        } else {
            message = `👍 Правильных ответов: ${earned} из ${maxScore}. Повтори правила и попробуй ещё раз!`;
        }
        const finalHtml = `
            <div class="final-screen">
                <h2>🏆 результат</h2>
                <div class="final-score">${earned} / ${maxScore}</div>
                <p style="font-size:1.2rem;">${message}</p>
                <button class="restart-btn" id="restartGameBtn">🔄 пройти заново</button>
            </div>
        `;
        contentDiv.innerHTML = finalHtml;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => {
            currentTask = 0;
            totalScore = 0;
            answersState = [];
            render();
            updateUI();
        });
    }

    // ВСТУПЛЕНИЕ (один слайд с правилами)
    function showIntro() {
        const introHtml = `
            <div class="intro-slide">
                <h2>🦉 здравствуй, юный орнитолог!</h2>
                <p>Тебя ждут вопросы о птицах. Выбери правильный ответ из трёх вариантов. В конце узнаешь свой результат. Удачи!</p>
                <button class="next-btn" id="startBtn">➡ начать</button>
            </div>
        `;
        contentDiv.innerHTML = introHtml;
        document.getElementById('startBtn')?.addEventListener('click', () => {
            render();
        });
        phaseInfoSpan.innerText = `вступление`;
    }

    showIntro();
    updateUI();
</script>
</body>
</html>
