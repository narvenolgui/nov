<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Финансовый квест — управляй деньгами умно</title>
    <meta name="description" content="Интерактивная игра по финансовой грамотности для 7–9 классов. Учимся планировать бюджет, избегать кредитных ловушек и распознавать мошенников.">
    <!-- Иконка для Яндекс Игр (загрузите отдельно icon.png 512x512) -->
    <link rel="icon" type="image/png" href="icon.png">
    <!-- Яндекс Игры SDK (обязательно) -->
    <script src="https://sdk.yandex.net/games/1.0/sdk.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a1a3a, #0f0f2a);
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 950px;
            width: 100%;
            background: rgba(25, 25, 55, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #2a2a5a, #1a1a3a);
            padding: 20px 28px;
            text-align: center;
            border-bottom: 3px solid #ffd700;
        }
        .header h1 {
            font-size: 2rem;
            letter-spacing: -0.5px;
            color: #ffd700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .header p {
            color: #c0c0e0;
            font-weight: bold;
            font-size: 1rem;
            background: #2a2a5a;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 40px;
            margin-top: 8px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #0f0f2a;
            padding: 12px 25px;
            color: #ffd700;
            font-weight: bold;
            border-bottom: 1px solid #ffd70033;
        }
        .score-box, .question-counter {
            background: #1a1a3a;
            padding: 5px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .content {
            padding: 28px;
        }
        .intro-slide, .rule-card {
            background: #1e1e40;
            border-radius: 48px;
            padding: 28px;
            text-align: center;
            border: 1px solid #ffd70033;
        }
        .intro-slide h2, .rule-card h2 {
            color: #ffd700;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        .intro-slide p, .intro-slide ul {
            color: #e0e0ff;
            font-size: 1.1rem;
            line-height: 1.5;
            text-align: left;
            margin-bottom: 20px;
        }
        .intro-slide ul {
            padding-left: 25px;
        }
        .chat-container {
            background: #1e1e40;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chat-window {
            background: #0f0f2a;
            border-radius: 32px;
            padding: 20px;
            height: 380px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 24px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.2s ease;
        }
        .message-left {
            background: #2a2a5a;
            color: #ffd700;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-right {
            background: #ffd700;
            color: #1a1a3a;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: bold;
        }
        .system-message {
            background: #2a2a5a;
            color: #c0c0e0;
            text-align: center;
            font-style: italic;
            padding: 8px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid #ffd70055;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .chat-next-btn, .chat-reset-btn {
            background: #2a2a5a;
            border: 1px solid #ffd700;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: #ffd700;
        }
        .demo-complete {
            margin-top: 20px;
            text-align: center;
        }
        .next-btn, .restart-btn {
            background: #ffd700;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.1s;
            color: #1a1a3a;
        }
        .scenario {
            background: #1e1e40;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 8px solid #ffd700;
        }
        .scenario h2 {
            color: #ffd700;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        .message-text {
            background: #0f0f2a;
            padding: 18px;
            border-radius: 32px;
            margin: 15px 0;
            font-style: italic;
            color: #e0e0ff;
            font-size: 1rem;
            line-height: 1.4;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-btn {
            background: #2a2a5a;
            border: 1px solid #ffd700;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: 0.1s;
            color: #e0e0ff;
            font-family: inherit;
        }
        .option-btn:hover {
            background: #3a3a6a;
            transform: scale(1.01);
        }
        .feedback {
            background: #0f0f2a;
            padding: 14px;
            border-radius: 32px;
            margin-top: 15px;
            font-weight: bold;
            border-left: 6px solid #ffd700;
            color: #e0e0ff;
        }
        .green-feedback { color: #ccffcc; background: #1a3a1a; border-left-color: #2eff2e; }
        .red-feedback { color: #ffcccc; background: #3a1a1a; border-left-color: #ff4444; }
        .manipulation-card {
            background: #1e1e40;
            border-radius: 48px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ffd700;
        }
        .manipulation-question {
            background: #0f0f2a;
            padding: 16px;
            border-radius: 32px;
            font-size: 1.1rem;
            margin-bottom: 18px;
            font-weight: bold;
            color: #ffd700;
        }
        .manipulation-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .manip-btn {
            background: #2a2a5a;
            border: 1px solid #ffd700;
            padding: 8px 18px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            color: #e0e0ff;
            font-family: inherit;
        }
        .manip-btn:hover {
            background: #3a3a6a;
        }
        .manip-feedback {
            margin-top: 12px;
            font-weight: bold;
            background: #0f0f2a;
            padding: 10px;
            border-radius: 24px;
            color: #e0e0ff;
        }
        .bright-rules {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border-radius: 48px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
            color: #1a1a3a;
        }
        .bright-rules p {
            font-size: 1rem;
            margin: 12px 0;
            font-weight: bold;
            color: #1a1a3a;
        }
        .bright-rules p:first-child {
            font-size: 1.4rem;
            text-align: center;
        }
        .final-screen {
            background: #1e1e40;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
        }
        .final-screen h2 {
            color: #ffd700;
        }
        .final-screen p {
            color: #e0e0ff;
            font-size: 1.1rem;
        }
        .final-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
            color: #ffd700;
        }
        .copyright {
            text-align: center;
            font-size: 0.7rem;
            padding: 12px;
            color: #6666aa;
            background: #0f0f2a;
        }
        @media (max-width: 550px) {
            .content { padding: 15px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="header">
        <h1>💰 Финансовый квест</h1>
        <p>Управляй деньгами с умом | 7–9 класс</p>
    </div>
    <div class="stats">
        <div class="score-box">⭐ Очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 <span id="phaseLabel">Вступление</span> <span id="qCurrent">1</span> / <span id="qTotal">3</span></div>
    </div>
    <div class="content" id="dynamicContent"></div>
    <div class="copyright">
        Интерактивный урок · Финансовая грамотность
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // ИНИЦИАЛИЗАЦИЯ SDK YANDEX GAMES
    // --------------------------------------------------------------
    (function() {
        if (typeof YaGames !== 'undefined') {
            YaGames.init().then(ysdk => {
                window.ysdk = ysdk;
                console.log('Yandex Games SDK ready');
                // Автоматический фикс размера окна
                ysdk.features.LoadingAPI?.ready();
            }).catch(e => console.warn('SDK init error', e));
        } else {
            console.warn('YaGames not loaded. Running without SDK (for local test)');
        }
    })();

    // --------------------------------------------------------------
    // ВСТУПИТЕЛЬНЫЕ СЛАЙДЫ
    // --------------------------------------------------------------
    const introSlides = [
        { title: "💡 Зачем нужны деньги?",
          text: "Деньги — это инструмент. Их можно тратить, копить, инвестировать. Но если не уметь управлять финансами, можно попасть в долговую яму или стать жертвой мошенников. Сегодня научимся основам финансовой грамотности.",
          list: null },
        { title: "📊 Основные правила",
          text: "Главные принципы финансово грамотного человека:",
          list: ["• Веди учёт доходов и расходов", "• Откладывай часть денег (подушка безопасности)", "• Не бери кредиты без необходимости", "• Не верь обещаниям лёгкого заработка"] },
        { title: "🎮 Как играть?",
          text: "Сначала разберём диалог о финансовых ошибках. Затем 4 жизненные ситуации. Выбирай правильный ответ, набирай баллы. В конце — памятка финансово грамотного человека.",
          list: null }
    ];

    // --------------------------------------------------------------
    // ДЕМО-ДИАЛОГ (кредит)
    // --------------------------------------------------------------
    const demoMessages = [
        { type: "left", text: "Купил себе новый телефон в кредит. Платить всего 5000 в месяц, ерунда!" },
        { type: "right", text: "А у тебя есть стабильный доход? Если что-то случится, придётся отдавать с процентами." },
        { type: "left", text: "Да ладно, у меня же карманные деньги есть. Родители помогут." },
        { type: "right", text: "Кредит — это долг. Переплата может быть огромной. Лучше копить." },
        { type: "system", text: "⚠️ Кредит без дохода — риск. Переплата по кредиту может достигать 30–50% от суммы." },
        { type: "right", text: "Я лучше отложу по 5000 в месяц и через полгода куплю телефон без переплаты." },
        { type: "system", text: "✅ Отличное решение! Копить выгоднее, чем брать кредит без необходимости." }
    ];

    // --------------------------------------------------------------
    // ИГРОВЫЕ СЦЕНАРИИ (финансовая грамотность)
    // --------------------------------------------------------------
    const scenarios = [
        { title: "💳 Карманные деньги", 
          message: "Ты получил 2000 рублей на неделю. Нужно купить проездной (800 руб.), пообедать в школе (300 руб.) и ещё хочется новый диск с игрой (1500 руб.). Что делать?",
          options: ["A) Купить игру, а на остальное занять у друзей", "B) Составить бюджет: сначала необходимое, а остаток отложить на игру", "C) Взять в долг у родителей и купить всё"],
          correct: 1, explanation: "✅ Бюджет помогает не остаться без денег. Сначала тратим на нужное, потом на желаемое.",
          wrongExplanations: ["❌ Долги — плохая привычка. Можешь не вернуть вовремя.", "❌ Постоянные долги перед родителями тоже не выход."],
          tip: "📌 Планируй расходы заранее. Откладывай часть денег на мечту." },
        { title: "📱 Кредит или накопления?", 
          message: "Ты хочешь купить смартфон за 30 000 руб. В магазине предлагают кредит под 20% годовых на год. У тебя есть 10 000 накоплений. Что выгоднее?",
          options: ["A) Взять кредит и радоваться покупке сейчас", "B) Копить ещё 5 месяцев и купить без переплаты", "C) Попросить у родителей и отдать потом"],
          correct: 1, explanation: "✅ Накопления выгоднее: переплата по кредиту составит около 3000–5000 руб.",
          wrongExplanations: ["❌ Кредит съест часть твоих будущих денег.", "❌ Долг родителям — это тоже обязательство, но лучше копить самому."],
          tip: "📌 Кредит бери только если это действительно необходимо и есть стабильный доход." },
        { title: "💰 Лёгкий заработок в интернете", 
          message: "Тебе пишет незнакомец: «Вложи 1000 руб., и через час получишь 5000! Гарантия 100%». Что делать?",
          options: ["A) Согласиться, ведь потеря невелика", "B) Игнорировать и заблокировать — это мошенники", "C) Попросить доказательства и попробовать"],
          correct: 1, explanation: "✅ Финансовые пирамиды и лёгкий заработок — обман. Никто не даст гарантий.",
          wrongExplanations: ["❌ Потеряешь деньги и можешь попасть в чёрный список.", "❌ Мошенники подделают любые доказательства."],
          tip: "📌 Если предлагают быстрый доход без риска — это 100% мошенники." },
        { title: "💸 Импульсивные траты", 
          message: "Ты видишь в интернет-магазине скидку 70% на кроссовки, но они тебе не очень нужны. У тебя есть 3000 руб. Твои действия?",
          options: ["A) Купить, ведь скидка большая", "B) Подумать: нужны ли они мне? Отложить деньги на действительно важное", "C) Взять в долг и купить ещё и сумку"],
          correct: 1, explanation: "✅ Скидка — не повод тратить деньги на ненужное. Лучше копить на цель.",
          wrongExplanations: ["❌ Покупка ненужных вещей опустошает бюджет.", "❌ Долг усугубит ситуацию."],
          tip: "📌 Прежде чем купить, спроси себя: «Нужна ли мне эта вещь через неделю?»" }
    ];

    // --------------------------------------------------------------
    // РАЗБОР ФИНАНСОВЫХ ЛОВУШЕК (4 вопроса)
    // --------------------------------------------------------------
    const manipulations = [
        { text: "Что такое финансовая подушка безопасности?",
          options: ["Запас денег на случай непредвиденных расходов", "Новая сумка для денег", "Кредитная карта"], correct: 0,
          explanation: "✅ Подушка безопасности — это сбережения на 3–6 месяцев жизни." },
        { text: "Что из перечисленного помогает копить деньги?",
          options: ["Ежедневно покупать кофе в кофейне", "Записывать все расходы и откладывать 10% доходов", "Брать микрозаймы"], correct: 1,
          explanation: "✅ Учёт расходов и регулярное откладывание — основа накоплений." },
        { text: "Как распознать финансовую пирамиду?",
          options: ["Обещают высокий доход без риска за привлечение новых людей", "Дают кредит под низкий процент", "Продают товары в магазине"], correct: 0,
          explanation: "✅ Пирамиды держатся на деньгах новых вкладчиков и быстро рушатся." },
        { text: "Что лучше: взять кредит или копить?",
          options: ["Копить, если покупка не срочная", "Всегда брать кредит, чтобы быстрее получить вещь", "Брать кредит в микрозайме"], correct: 0,
          explanation: "✅ Копить выгоднее: не платишь проценты и не рискуешь." }
    ];

    // --------------------------------------------------------------
    // ЛОГИКА ИГРЫ
    // --------------------------------------------------------------
    let currentPhase = "intro";
    let introIndex = 0;
    let demoStep = 0;
    let gameIndex = 0;
    let practiceIndex = 0;
    let totalScore = 0;
    let gameAnswered = false;
    let selectedGameOpt = -1;
    let practiceAnswers = [false, false, false, false];

    const dynamicDiv = document.getElementById('dynamicContent');
    const scoreSpan = document.getElementById('scoreValue');
    const qCurrentSpan = document.getElementById('qCurrent');
    const qTotalSpan = document.getElementById('qTotal');
    const phaseLabelSpan = document.getElementById('phaseLabel');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        if (currentPhase === "intro") {
            phaseLabelSpan.innerText = "Вступление";
            qTotalSpan.innerText = introSlides.length;
            qCurrentSpan.innerText = introIndex+1;
        } else if (currentPhase === "demo") {
            phaseLabelSpan.innerText = "Разбор диалога";
            qTotalSpan.innerText = demoMessages.length;
            qCurrentSpan.innerText = demoStep;
        } else if (currentPhase === "game") {
            phaseLabelSpan.innerText = "Игра";
            qTotalSpan.innerText = scenarios.length;
            qCurrentSpan.innerText = gameIndex+1;
        } else if (currentPhase === "practice") {
            phaseLabelSpan.innerText = "Фин-задания";
            qTotalSpan.innerText = manipulations.length;
            qCurrentSpan.innerText = practiceIndex+1;
        }
    }

    function renderIntro() {
        if (introIndex >= introSlides.length) {
            currentPhase = "demo";
            demoStep = 0;
            renderDemo();
            updateUI();
            return;
        }
        const slide = introSlides[introIndex];
        let html = `<div class="intro-slide"><h2>${slide.title}</h2><p>${slide.text}</p>`;
        if (slide.list) {
            html += `<ul>${slide.list.map(item => `<li>${item}</li>`).join('')}</ul>`;
        }
        html += `<button class="next-btn" id="introNextBtn">➡ ДАЛЕЕ</button></div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('introNextBtn')?.addEventListener('click', () => {
            introIndex++;
            renderIntro();
            updateUI();
        });
        updateUI();
    }

    function renderDemo() {
        if (demoStep >= demoMessages.length) {
            const completeHtml = `
                <div class="chat-container">
                    <div class="chat-window">
                        ${demoMessages.map((msg, idx) => {
                            if (idx < demoStep) {
                                if (msg.type === "left") return `<div class="message message-left">💬 ${msg.text}</div>`;
                                if (msg.type === "right") return `<div class="message message-right">🧑 ${msg.text}</div>`;
                                if (msg.type === "system") return `<div class="system-message">📢 ${msg.text}</div>`;
                            }
                            return '';
                        }).join('')}
                    </div>
                    <div class="demo-complete">
                        <p style="margin-bottom:15px;">✅ Кредит без дохода — риск. Лучше копить!</p>
                        <button class="next-btn" id="goToGameBtn">🎮 К ИГРЕ</button>
                    </div>
                </div>
            `;
            dynamicDiv.innerHTML = completeHtml;
            document.getElementById('goToGameBtn')?.addEventListener('click', () => {
                currentPhase = "game";
                gameIndex = 0;
                gameAnswered = false;
                selectedGameOpt = -1;
                renderGame();
                updateUI();
            });
            return;
        }
        let html = `<div class="chat-container"><div class="chat-window" id="chatWindow">`;
        for (let i = 0; i < demoStep; i++) {
            const msg = demoMessages[i];
            if (msg.type === "left") html += `<div class="message message-left">💬 ${msg.text}</div>`;
            else if (msg.type === "right") html += `<div class="message message-right">🧑 ${msg.text}</div>`;
            else if (msg.type === "system") html += `<div class="system-message">📢 ${msg.text}</div>`;
        }
        html += `</div><div class="chat-controls"><button class="chat-next-btn" id="demoNextBtn">➡ ДАЛЕЕ</button>`;
        if (demoStep > 0) {
            html += `<button class="chat-reset-btn" id="demoResetBtn">🔄 ЗАНОВО</button>`;
        }
        html += `</div></div>`;
        dynamicDiv.innerHTML = html;
        const chatWindow = document.getElementById('chatWindow');
        if (chatWindow) chatWindow.scrollTop = chatWindow.scrollHeight;
        document.getElementById('demoNextBtn')?.addEventListener('click', () => {
            if (demoStep < demoMessages.length) {
                demoStep++;
                renderDemo();
                updateUI();
            }
        });
        document.getElementById('demoResetBtn')?.addEventListener('click', () => {
            demoStep = 0;
            renderDemo();
            updateUI();
        });
        updateUI();
    }

    function renderGame() {
        if (gameIndex >= scenarios.length) {
            currentPhase = "practice";
            practiceIndex = 0;
            practiceAnswers = [false, false, false, false];
            renderPractice();
            updateUI();
            return;
        }
        const s = scenarios[gameIndex];
        let html = `
            <div class="scenario">
                <h2>${s.title}</h2>
                <div class="message-text">${s.message.replace(/\n/g, '<br>')}</div>
                <div class="options" id="optionsContainer">
        `;
        s.options.forEach((opt, idx) => {
            html += `<button class="option-btn" data-opt-index="${idx}">${opt}</button>`;
        });
        html += `</div><div id="feedbackArea" class="feedback" style="display: none;"></div>`;
        html += `<button class="next-btn" id="nextButton">➡ ДАЛЬШЕ</button></div>`;
        dynamicDiv.innerHTML = html;

        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                if (gameAnswered) return;
                const idx = parseInt(btn.dataset.optIndex);
                handleGameAnswer(idx);
            });
        });
        const nextBtn = document.getElementById('nextButton');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!gameAnswered) return;
                gameIndex++;
                gameAnswered = false;
                selectedGameOpt = -1;
                renderGame();
                updateUI();
            });
        }
        if (gameAnswered && selectedGameOpt !== -1) showGameFeedback();
        updateUI();
    }

    function handleGameAnswer(optIndex) {
        gameAnswered = true;
        selectedGameOpt = optIndex;
        const s = scenarios[gameIndex];
        const isCorrect = (optIndex === s.correct);
        if (isCorrect) {
            totalScore += 20;
            updateUI();
        }
        showGameFeedback();
        document.querySelectorAll('.option-btn').forEach(btn => {
            btn.style.opacity = '0.6';
            btn.style.pointerEvents = 'none';
        });
    }

    function showGameFeedback() {
        const s = scenarios[gameIndex];
        const isCorrect = (selectedGameOpt === s.correct);
        const feedbackDiv = document.getElementById('feedbackArea');
        if (!feedbackDiv) return;
        feedbackDiv.style.display = 'block';
        let feedbackText = '';
        if (isCorrect) {
            feedbackText = `<span style="color:#ccffcc;">✅ ${s.explanation}</span><br><br>${s.tip}`;
            feedbackDiv.classList.add('green-feedback');
        } else {
            let wrongMsg = (selectedGameOpt === 0) ? s.wrongExplanations[0] : (selectedGameOpt === 1 ? s.wrongExplanations[1] : s.wrongExplanations[0]);
            if (selectedGameOpt === 2 && s.wrongExplanations[1]) wrongMsg = s.wrongExplanations[1];
            feedbackText = `<span style="color:#ffcccc;">❌ ${wrongMsg}</span><br><br>${s.tip}`;
            feedbackDiv.classList.add('red-feedback');
        }
        feedbackDiv.innerHTML = feedbackText;
    }

    function renderPractice() {
        if (practiceIndex >= manipulations.length) {
            showFinalScreen();
            return;
        }
        const m = manipulations[practiceIndex];
        const alreadyAnswered = practiceAnswers[practiceIndex];
        let html = `
            <div class="manipulation-card">
                <h2 style="color:#ffd700;">💰 Задание ${practiceIndex+1} из ${manipulations.length}</h2>
                <div class="manipulation-question">${m.text}</div>
                <div class="manipulation-options" id="manipOpts">
        `;
        m.options.forEach((opt, idx) => {
            html += `<button class="manip-btn" data-manip-idx="${idx}">${opt}</button>`;
        });
        html += `</div><div id="manipFeedback" class="manip-feedback"></div>`;
        if (!alreadyAnswered) {
            html += `<button class="next-btn" id="nextPracticeBtn" style="display:none;">➡ ДАЛЬШЕ</button>`;
        } else {
            html += `<button class="next-btn" id="nextPracticeBtn">➡ ДАЛЬШЕ</button>`;
        }
        html += `</div>`;
        dynamicDiv.innerHTML = html;

        if (!alreadyAnswered) {
            document.querySelectorAll('.manip-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (practiceAnswers[practiceIndex]) return;
                    const selected = parseInt(btn.dataset.manipIdx);
                    const isCorrect = (selected === m.correct);
                    if (isCorrect) {
                        totalScore += 5;
                        updateUI();
                        document.getElementById('manipFeedback').innerHTML = `<span style="color:#ccffcc;">✅ ${m.explanation}</span>`;
                    } else {
                        document.getElementById('manipFeedback').innerHTML = `<span style="color:#ffcccc;">❌ Неверно. ${m.explanation}</span>`;
                    }
                    practiceAnswers[practiceIndex] = true;
                    const nextBtn = document.getElementById('nextPracticeBtn');
                    if (nextBtn) nextBtn.style.display = 'block';
                    document.querySelectorAll('.manip-btn').forEach(btn => btn.disabled = true);
                });
            });
        } else {
            const feedbackDiv = document.getElementById('manipFeedback');
            if (feedbackDiv) feedbackDiv.innerHTML = `<span style="color:#ffd700;">⏩ Ты уже ответил. Нажми «ДАЛЬШЕ».</span>`;
            document.querySelectorAll('.manip-btn').forEach(btn => btn.disabled = true);
        }
        const nextBtn = document.getElementById('nextPracticeBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!practiceAnswers[practiceIndex]) return;
                practiceIndex++;
                renderPractice();
                updateUI();
            });
        }
        updateUI();
    }

    function showFinalScreen() {
        const maxGame = scenarios.length * 20;
        const maxPractice = manipulations.length * 5;
        const totalMax = maxGame + maxPractice;
        let message = '';
        if (totalScore === totalMax) {
            message = '🎉 Поздравляю! Ты финансово грамотный человек! Управляй деньгами с умом. 🎉';
        } else if (totalScore >= 60) {
            message = '👍 Хороший результат! Повтори правила финансовой безопасности и будет ещё лучше.';
        } else {
            message = '📚 Пройди игру ещё раз. Финансовая грамотность поможет избежать долгов и мошенников.';
        }
        const finalHtml = `
            <div class="final-screen">
                <h2>🏆 ИТОГ</h2>
                <div class="final-score">${totalScore} / ${totalMax}</div>
                <p>${message}</p>
                <div class="bright-rules">
                    <p>💰 ЗОЛОТЫЕ ПРАВИЛА</p>
                    <p>1️⃣ Веди учёт доходов и расходов.</p>
                    <p>2️⃣ Откладывай 10–20% доходов в подушку безопасности.</p>
                    <p>3️⃣ Не бери кредиты без необходимости.</p>
                    <p>4️⃣ Не верь обещаниям лёгкого заработка.</p>
                    <p>5️⃣ Прежде чем купить, спроси себя: «Нужно ли мне это?»</p>
                </div>
                <button class="restart-btn" id="fullRestartBtn">🔄 Пройти заново</button>
            </div>
        `;
        dynamicDiv.innerHTML = finalHtml;
        document.getElementById('fullRestartBtn')?.addEventListener('click', () => {
            currentPhase = "intro";
            introIndex = 0;
            demoStep = 0;
            gameIndex = 0;
            practiceIndex = 0;
            totalScore = 0;
            gameAnswered = false;
            selectedGameOpt = -1;
            practiceAnswers = [false, false, false, false];
            renderIntro();
            updateUI();
        });
    }

    renderIntro();
    updateUI();
</script>
</body>
</html>
