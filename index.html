<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Финансовый квест с Финусом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* Чтобы текст не выделялся при кликах на телефоне */
        }

        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Comic Sans MS', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        /* Контейнер игры с красивой обводкой */
        .game-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255,248,225,0.95);
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4), inset 0 1px 4px rgba(255,255,200,0.8);
            overflow: hidden;
            backdrop-filter: blur(1px);
            transition: all 0.2s ease;
        }

        /* Хедер с монетками и монстриком */
        .game-header {
            background: #fddc9c;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f4b642;
        }

        .score-area {
            background: #2c2b28;
            padding: 6px 16px;
            border-radius: 100px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.3rem;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5), 0 2px 4px rgba(255,215,0,0.5);
        }

        .score-area span {
            color: white;
            margin-right: 6px;
        }

        .character-icon {
            font-size: 2.2rem;
            background: #b97f44;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 35%, #ffb347, #b4621a);
            box-shadow: 0 4px 0 #6b3e0c;
        }

        /* Основное окно с контентом */
        .game-main {
            padding: 25px 20px 30px;
            min-height: 460px;
            display: flex;
            flex-direction: column;
        }

        /* Стили текста и кнопок */
        h2, .step-title {
            font-size: 1.7rem;
            color: #3e2a1f;
            text-align: center;
            margin-bottom: 15px;
        }

        .story-text, .dialogue-text {
            background: #fff9ef;
            padding: 20px;
            border-radius: 35px;
            line-height: 1.5;
            font-size: 1.1rem;
            color: #2d2b26;
            box-shadow: inset 0 0 0 2px #ffeecc, 0 6px 12px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .options-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 10px 0;
        }

        button {
            background: #ffdd99;
            border: none;
            padding: 12px 18px;
            border-radius: 60px;
            font-size: 1.05rem;
            font-weight: bold;
            color: #3b2a1f;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #b97f44;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b97f44;
        }

        .choice-btn {
            background: #fffaec;
            border: 2px solid #f7b05e;
            text-align: left;
            padding: 12px 20px;
        }

        .restart-btn {
            background: #f29b45;
            color: white;
            text-align: center;
            margin-top: 15px;
            box-shadow: 0 3px 0 #864e1c;
        }

        /* карточки ответов для викторин */
        .quiz-option {
            background: #efe2cf;
            margin-bottom: 12px;
            border-radius: 50px;
            padding: 12px 18px;
            cursor: pointer;
            transition: 0.1s;
            font-weight: 500;
        }

        .quiz-option:hover {
            background: #f7e5c2;
        }

        .feedback {
            font-size: 1rem;
            margin: 10px 0;
            padding: 8px;
            border-radius: 30px;
            text-align: center;
        }

        .correct-feedback {
            background: #cbe5be;
            color: #1e4a1a;
        }

        .wrong-feedback {
            background: #ffe0cc;
            color: #b33;
        }

        .hidden {
            display: none;
        }

        footer {
            text-align: center;
            background: #e9dbbd;
            font-size: 0.7rem;
            padding: 10px;
            color: #6f5a3a;
        }
    </style>
</head>
<body>
<div class="game-container" id="gameContainer">
    <div class="game-header">
        <div class="character-icon">💸</div>
        <div class="score-area"><span>🏆 Знаний:</span> <span id="scoreValue">0</span></div>
    </div>
    <div class="game-main" id="gameMain">
        <!-- Динамический контент -->
        <div id="dynamicContent"></div>
    </div>
    <footer>🐾 Финансовый квест с Финусом — учимся копить и не вестись на уловки!</footer>
</div>

<!-- Интеграция Яндекс ИГР SDK (асинхронно, как требуют модераторы) -->
<script src="/sdk.js"></script>
<script>
    (function() {
        // ======================== ЭТАП: ЯНДЕКС SDK ИНИЦИАЛИЗАЦИЯ ==================
        let ysdk = null;
        let gameReadyFlag = false;
        let isGamePaused = false;
        
        // Функция для вызова при сворачивании/разворачивании вкладки (обязательное требование модерации)
        function setupVisibilityAPI() {
            const handleVisibilityChange = () => {
                if (document.hidden) {
                    if (!isGamePaused && window.pauseGameCallback) {
                        window.pauseGameCallback(true);
                        isGamePaused = true;
                    }
                } else {
                    if (isGamePaused && window.resumeGameCallback) {
                        window.resumeGameCallback();
                        isGamePaused = false;
                    }
                }
            };
            document.addEventListener('visibilitychange', handleVisibilityChange);
        }

        // Инициализация SDK и готовая игра
        async function initYandex() {
            try {
                if (typeof YaGames !== 'undefined') {
                    ysdk = await YaGames.init();
                    // Обязательно вызываем GameReady после инициализации интерфейса
                    if (ysdk && typeof ysdk.gameReady === 'function') {
                        await ysdk.gameReady();
                        console.log('Game ready for Yandex moderation');
                    }
                    // Дополнительно: проверка авторизации/гостевой вход (требование пункта 2.14)
                    const player = await ysdk.getPlayer();
                    // Автоматическое приветствие через SDK, гостевой режим работает без регистрации
                    if (player && player.getMode() === 'unknown') {
                        // Гостевой режим — сохраняем всё локально (у нас и так локально)
                    }
                }
            } catch (e) {
                console.warn('Yandex SDK not loaded, but game runs as standalone:', e);
            }
            // в любом случае запускаем игру
            startGameEngine();
        }

        // -------- Игровая логика финансового квеста (сохранение, пауза, весь ваш код) ---------
        let gameState = {
            currentStep: 'intro', // intro, dialogue, game_scenario, quiz, final
            activeScenario: null,
            currentDialogueIndex: 0,
            quizScore: 0,
            stage: 0,
            scenarioData: null,
            quizQuestions: [],
            pendingCallback: null
        };
        let score = 0;
        const dialogues = {
            intro: [
                { speaker: '🐉 Финус (финансовый монстрик)', text: 'Ух ты! Добро пожаловать в мою школу финансов! Сегодня узнаем, как дружить с деньгами.' },
                { speaker: '🐉 Финус', text: 'Научимся планировать бюджет, отличать нужное от желаемого и не попадаться на удочку мошенников!' },
                { speaker: '💬 Инструктор', text: 'Читай диалоги, выбирай варианты в заданиях. Чем больше правильных финансовых решений — тем выше ваш счет знаний!' }
            ],
            creditChat: [
                { speaker: '😟 Дима (подросток)', text: 'Я заказал новый айфон в кредит! Платить всего по 5000₽ в месяц, легко!' },
                { speaker: '🐉 Финус', text: 'Дима, а у тебя есть постоянная работа? Сколько ты зарабатываешь?' },
                { speaker: '😟 Дима', text: 'Ну... подрабатываю курьером по выходным, ~8000₽ в месяц.' },
                { speaker: '🐉 Финус', text: 'Кредит без стабильного дохода — это ловушка! Если потеряешь подработку, долг вырастет, испортишь кредитную историю.' },
                { speaker: '😟 Дима', text: 'Ого... лучше копить, чем брать кредит бездумно!' }
            ]
        };

        // Данные для 4 сценариев
        const scenarios = {
            pocketMoney: {
                title: '💰 Карманные деньги',
                description: 'У тебя 600₽ на неделю. Траты: проезд (200₽), обед (150₽), кино с друзьями (300₽), шоколадка (100₽). Выбери разумный бюджет.',
                options: [
                    { text: 'Потратить всё подряд: кино + шоколадка + проезд + обед, остаться без денег на среду.', correct: false, feedback: 'Без плана останешься без денег!' },
                    { text: 'Купить шоколадку, но отказаться от кино, сэкономив на желаемом.', correct: true, feedback: 'Отлично! Важно различать «хочу» и «надо»' },
                    { text: 'Взять деньги у родителей, если не хватит.', correct: false, feedback: 'Лучше учиться планировать самому.' }
                ]
            },
            creditVsSave: {
                title: '📱 Кредит или накопления?',
                description: 'Телефон стоит 30 000₽. Кредит на год под 20% годовых. Или копить по 3000₽ в месяц.',
                options: [
                    { text: 'Взять кредит, переплатить ~3000₽ и получить телефон сразу', correct: false, feedback: 'Переплата почти 3000₽ - это два дня работы.' },
                    { text: 'Копить 10 месяцев и купить без переплаты!', correct: true, feedback: 'Верно! Накопления экономят твои деньги.' },
                    { text: 'Всё равно, кредит удобнее', correct: false, feedback: 'Удобство дорого стоит.' }
                ]
            },
            easyMoney: {
                title: '💻 Лёгкий заработок в сети',
                description: 'Тебе пишет «инвестор»: вложи 1000₽, через час получишь 5000₽. Твои действия?',
                options: [
                    { text: 'Круто! Закину все сбережения!', correct: false, feedback: 'Это финансовая пирамида/мошенники!' },
                    { text: 'Проигнорирую и пожалуюсь в техподдержку.', correct: true, feedback: 'Умный подход! Быстрые гарантии — обман.' },
                    { text: 'Попрошу друга тоже вложиться', correct: false, feedback: 'Не втягивай близких в сомнительные схемы.' }
                ]
            },
            impulsiveSpending: {
                title: '🛍️ Импульсивная покупка',
                description: 'Ты видишь суперскидку 80% на игровую приставку. Она тебе не особо нужна, но акция кончается сегодня.',
                options: [
                    { text: 'Куплю, пока дешево! Вдруг пригодится', correct: false, feedback: 'Ненужная вещь даже со скидкой — потеря бюджета.' },
                    { text: 'Возьму паузу на день, подумаю, нужно ли.', correct: true, feedback: 'Золотое правило! Отложи покупку на 24 часа.' },
                    { text: 'Займу у друга, ведь акция', correct: false, feedback: 'Долги ради необдуманных вещей — плохо.' }
                ]
            }
        };

        const quizBank = [
            { question: 'Что такое "подушка безопасности"?', options: ['Деньги на развлечения', 'Запас денег на случай потери дохода', 'Страховка телефона'], correct: 1, explanation: 'Подушка — это сбережения на 3–6 месяцев жизни.' },
            { question: 'Как лучше следить за финансами?', options: ['Вести учёт доходов и расходов', 'Держать все деньги в копилке', 'Тратить интуитивно'], correct: 0, explanation: 'Записи помогают видеть реальные траты.' },
            { question: 'Признак финансовой пирамиды:', options: ['Огромная гарантированная доходность', 'Лицензия ЦБ', 'Прозрачный бизнес'], correct: 0, explanation: 'Сверхдоходы без риска — обман.' },
            { question: 'Кредит лучше брать если...', options: ['Ты точно можешь ежемесячно платить без ущерба', 'Спонтанное желание', 'Друзья посоветовали'], correct: 0, explanation: 'Взвешенный подход и расчёт платежей.' }
        ];

        function updateScoreUI() { document.getElementById('scoreValue').innerText = score; }
        function addPoints(p) { score += p; updateScoreUI(); }

        // Пауза/звук (звуков в игре нет, но остановка логики если надо)
        window.pauseGameCallback = (paused) => { if(paused) console.log('Гame paused by tab'); };
        window.resumeGameCallback = () => {};

        function renderScreen(contentHTML) {
            document.getElementById('dynamicContent').innerHTML = contentHTML;
            attachEventDelegation();
        }
        
        function attachEventDelegation() {
            const container = document.getElementById('dynamicContent');
            if(!container) return;
            container.querySelectorAll('.choice-btn, .quiz-option, .next-dialogue, .restart-btn, .play-scenario').forEach(el => {
                el.removeEventListener('click', window._handler);
                const handler = (e) => {
                    const action = el.dataset.action;
                    if(action === 'nextDialogue') nextDialogue();
                    else if(action === 'restart') fullRestart();
                    else if(action === 'runScenario') runScenario(el.dataset.scenario);
                    else if(action === 'answer') {
                        const points = parseInt(el.dataset.points) || 0;
                        handleScenarioAnswer(el.dataset.optIndex, points);
                    }
                    else if(action === 'quizAnswer') {
                        const qIdx = parseInt(el.dataset.qidx);
                        const optIdx = parseInt(el.dataset.optIdx);
                        handleQuizAnswer(qIdx, optIdx);
                    }
                };
                el.addEventListener('click', handler);
                el._handler = handler;
            });
        }

        // Основной движок состояний
        function startGameEngine() {
            score = 0;
            updateScoreUI();
            gameState.currentStep = 'intro';
            gameState.currentDialogueIndex = 0;
            showIntro();
            setupVisibilityAPI();
        }

        function showIntro() {
            if(gameState.currentDialogueIndex < dialogues.intro.length) {
                const line = dialogues.intro[gameState.currentDialogueIndex];
                const html = `
                    <div class="story-text"><strong>${line.speaker}</strong><br>${line.text}</div>
                    <button class="next-dialogue" data-action="nextDialogue">➡️ Дальше</button>
                `;
                renderScreen(html);
            } else {
                // После вступления перейти к диалогу про кредит
                gameState.currentStep = 'dialogue';
                gameState.currentDialogueIndex = 0;
                showCreditDialogue();
            }
        }
        function nextDialogue() {
            gameState.currentDialogueIndex++;
            if(gameState.currentStep === 'intro') showIntro();
            else if(gameState.currentStep === 'dialogue') showCreditDialogue();
        }
        function showCreditDialogue() {
            if(gameState.currentDialogueIndex < dialogues.creditChat.length) {
                const line = dialogues.creditChat[gameState.currentDialogueIndex];
                const html = `
                    <div class="story-text"><strong>${line.speaker}</strong><br>${line.text}</div>
                    <button class="next-dialogue" data-action="nextDialogue">🗣️ Далее</button>
                `;
                renderScreen(html);
            } else {
                // после диалога покажем выбор сценария
                showScenarioLobby();
            }
        }

        function showScenarioLobby() {
            const scenarioNames = {
                pocketMoney: '📋 Карманные деньги',
                creditVsSave: '📉 Кредит или накопления',
                easyMoney: '🖱️ Легкий заработок',
                impulsiveSpending: '🎯 Импульсивные траты'
            };
            let btns = '';
            for(let key in scenarios) {
                btns += `<button class="play-scenario" data-action="runScenario" data-scenario="${key}">🎲 ${scenarioNames[key]}</button>`;
            }
            const html = `
                <h2>🎮 Игровые сценарии</h2>
                <div class="options-area">${btns}</div>
                <p style="margin-top:10px">Пройди все 4 задания, а затем ответь на вопросы викторины!</p>
            `;
            renderScreen(html);
        }

        function runScenario(scenarioId) {
            gameState.activeScenario = scenarioId;
            gameState.stage = 0;
            const sc = scenarios[scenarioId];
            const html = `
                <h3>${sc.title}</h3>
                <div class="story-text">${sc.description}</div>
                <div class="options-area">
                    ${sc.options.map((opt, idx) => `<button class="choice-btn" data-action="answer" data-opt-index="${idx}" data-points="${opt.correct ? 10 : 0}">${opt.text}</button>`).join('')}
                </div>
            `;
            renderScreen(html);
        }

        function handleScenarioAnswer(optIndex, pointsGain) {
            const sc = scenarios[gameState.activeScenario];
            const chosen = sc.options[optIndex];
            let feedbackMsg = chosen.feedback;
            const isCorrect = chosen.correct;
            if(isCorrect) addPoints(10);
            
            const html = `
                <div class="story-text">✅ Ваш ответ: ${chosen.text}</div>
                <div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">${feedbackMsg} ${isCorrect ? '+10 знаний' : ''}</div>
                <button class="restart-btn" data-action="runScenario" data-scenario="${gameState.activeScenario}" style="margin-top: 20px;">🔁 Пройти другой сценарий</button>
                <button class="restart-btn" data-action="restart" style="margin-top: 10px;">🏠 Главное меню</button>
            `;
            renderScreen(html);
            // обновить делегирование для кнопок
            attachEventDelegation();
        }

        function fullRestart() { startGameEngine(); }

        // Функция глобальная запуска после того, как SDK подгрузился
        window.showQuiz = function() {
            gameState.quizQuestions = [...quizBank];
            gameState.currentQuizIndex = 0;
            gameState.quizScore = 0;
            renderQuizQuestion(0);
        };
        function renderQuizQuestion(idx) {
            if(idx >= quizBank.length) {
                const finalMessage = score >= 40 ? '✨ Ты финансовый гений! ✨' : '📚 Хороший старт, учись дальше!';
                let finalGoldenRules = `<div class="story-text"><strong>🎓 Золотые правила финансов:</strong><br>1. Живи по средствам<br>2. Откладывай 10% дохода<br>3. Избегай спонтанных кредитов<br>4. Создай подушку безопасности<br>5. Проверяй информацию о заработке!</div>`;
                let finalHtml = `<h2>🏆 Итоги квеста</h2><div class="story-text">${finalMessage}<br>Твой счёт знаний: ${score} очков</div>${finalGoldenRules}<button class="restart-btn" data-action="restart">🔄 Пройти заново</button>`;
                renderScreen(finalHtml);
                return;
            }
            const q = quizBank[idx];
            const optionsHtml = q.options.map((opt, oIdx) => `<div class="quiz-option" data-action="quizAnswer" data-qidx="${idx}" data-opt-idx="${oIdx}">${opt}</div>`).join('');
            const html = `<h3>📝 Вопрос ${idx+1}/${quizBank.length}</h3><div class="story-text">${q.question}</div><div class="options-area">${optionsHtml}</div>`;
            renderScreen(html);
        }
        function handleQuizAnswer(qIdx, optIdx) {
            const correct = (quizBank[qIdx].correct === optIdx);
            if(correct) addPoints(10);
            const explanation = quizBank[qIdx].explanation;
            const feedbackDiv = `<div class="feedback ${correct ? 'correct-feedback' : 'wrong-feedback'}">${correct ? '✅ Верно! ' : '❌ Ошибка. '} ${explanation}</div><button class="next-dialogue" data-action="nextQuiz">Далее</button>`;
            const currentHtml = document.getElementById('dynamicContent').innerHTML;
            document.getElementById('dynamicContent').innerHTML = currentHtml + feedbackDiv;
            const nextBtn = document.querySelector('[data-action="nextQuiz"]');
            if(nextBtn) {
                nextBtn.addEventListener('click', () => {
                    renderQuizQuestion(qIdx+1);
                });
            }
            attachEventDelegation();
        }

        // Переопределим для викторины nextQuiz
        window.nextQuiz = function() {
            if(gameState.currentQuizIndex < quizBank.length-1) {
                gameState.currentQuizIndex++;
                renderQuizQuestion(gameState.currentQuizIndex);
            } else {
                renderQuizQuestion(quizBank.length);
            }
        };
        // доп. переход
        document.addEventListener('click', (e) => {
            if(e.target.closest('[data-action="nextQuiz"]')) {
                if(gameState.currentQuizIndex === undefined) gameState.currentQuizIndex = 0;
                if(gameState.currentQuizIndex < quizBank.length-1) gameState.currentQuizIndex++;
                else gameState.currentQuizIndex = quizBank.length;
                renderQuizQuestion(gameState.currentQuizIndex);
            }
            if(e.target.closest('[data-action="runScenario"]')) {
                const btn = e.target.closest('[data-action="runScenario"]');
                if(btn) runScenario(btn.dataset.scenario);
            }
            if(e.target.closest('[data-action="restart"]')) fullRestart();
            if(e.target.closest('[data-action="answer"]')) {
                // handled
            }
        });
        
        // Старт после загрузки
        window.initYandex = initYandex;
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initYandex);
        else initYandex();
    })();
</script>
</body>
</html>
