<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Секреты здоровья</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #b5e4e0;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .game-container {
            max-width: 750px;
            width: 100%;
            background: #fefaf0;
            border-radius: 64px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: #f3b3a6;
            padding: 20px 28px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            color: #4a2e2a;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #fff3e8;
            padding: 12px 25px;
            font-weight: bold;
            color: #c25b48;
        }
        .score-box, .question-counter {
            background: #ffffff;
            padding: 5px 18px;
            border-radius: 60px;
        }
        .content {
            padding: 25px;
        }
        .task-card {
            background: #fffaf2;
            border-radius: 48px;
            padding: 25px;
            text-align: center;
        }
        .task-question {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #c25b48;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
        }
        .opt-btn {
            background: #f3b3a6;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #c25b48;
            color: #4a2e2a;
            min-width: 120px;
            transition: 0.05s linear;
        }
        .opt-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #c25b48;
        }
        .opt-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: default;
        }
        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .correct-feedback {
            background: #d9f0da;
            color: #1e5a2a;
            border-left: 10px solid #2e7d32;
        }
        .wrong-feedback {
            background: #ffe0e0;
            color: #a1131e;
            border-left: 10px solid #d32f2f;
        }
        .next-btn {
            background: #f4a261;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 25px;
            cursor: pointer;
            color: white;
            box-shadow: 0 5px 0 #c45c2c;
        }
        .final-screen {
            background: #fffaf0;
            border-radius: 60px;
            padding: 25px;
            text-align: center;
        }
        .final-screen h2 {
            color: #c25b48;
        }
        .final-score {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
            background: #fef3da;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
            color: #1e5a2a;
        }
        .restart-btn {
            background: #f4a261;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            margin-top: 20px;
            cursor: pointer;
            color: white;
        }
        .copyright {
            text-align: center;
            font-size: 0.7rem;
            padding: 12px;
            background: #fff3e8;
            color: #c0a06b;
        }
        @media (max-width: 550px) {
            .task-question { font-size: 1.2rem; }
            .opt-btn { font-size: 1rem; padding: 8px 15px; min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <div class="header">
        <h1>Секреты здоровья</h1>
    </div>
    <div class="stats">
        <div class="score-box">⭐ Очки: <span id="scoreValue">0</span></div>
        <div class="question-counter">📋 <span id="phaseInfo">Задание 1 из 8</span></div>
    </div>
    <div class="content" id="mainContent"></div>
    <div class="copyright">
        Тренажёр по гигиене и здоровому образу жизни
    </div>
</div>

<script>
    // ----- ВОПРОСЫ И ОТВЕТЫ (только по теме гигиены и ЗОЖ) -----
    // Все ответы написаны строчными буквами, вопросы начинаются с заглавной
    const tasks = [
        { q: "Что нужно делать каждое утро, чтобы быть бодрым?", opts: ["зарядка", "смотреть мультфильмы", "долго спать"], correct: "зарядка", hint: "утренняя зарядка помогает проснуться и укрепляет здоровье." },
        { q: "Какой продукт полезен для зубов?", opts: ["конфеты", "яблоко", "чипсы"], correct: "яблоко", hint: "яблоки содержат витамины и помогают чистить зубы." },
        { q: "Сколько раз в день нужно чистить зубы?", opts: ["один раз", "два раза", "раз в неделю"], correct: "два раза", hint: "зубы нужно чистить утром и вечером." },
        { q: "Что лучше пить, чтобы утолить жажду?", opts: ["газировка", "сок из пакета", "вода"], correct: "вода", hint: "вода – самый полезный напиток." },
        { q: "Что нужно сделать перед едой?", opts: ["помыть руки", "попрыгать", "позвонить другу"], correct: "помыть руки", hint: "на грязных руках живут микробы." },
        { q: "Какой продукт нужно есть для крепких костей?", opts: ["творог", "конфеты", "газировка"], correct: "творог", hint: "творог содержит кальций, полезный для костей." },
        { q: "Сколько времени нужно гулять на свежем воздухе?", opts: ["10 минут", "не менее часа", "целый день"], correct: "не менее часа", hint: "прогулки укрепляют здоровье и поднимают настроение." },
        { q: "Что помогает защититься от микробов?", opts: ["мыло", "пыль", "грязные руки"], correct: "мыло", hint: "мыло и вода убивают микробов." }
    ];

    let currentTask = 0;
    let totalScore = 0;
    let answersState = [];

    const contentDiv = document.getElementById('mainContent');
    const scoreSpan = document.getElementById('scoreValue');
    const phaseInfoSpan = document.getElementById('phaseInfo');

    function updateUI() {
        scoreSpan.innerText = totalScore;
        if (currentTask < tasks.length) {
            phaseInfoSpan.innerText = `Задание ${currentTask+1} из ${tasks.length}`;
        } else {
            phaseInfoSpan.innerText = "Результат";
        }
    }

    function render() {
        if (currentTask < tasks.length) {
            renderTask(currentTask);
        } else {
            showFinalScreen();
        }
    }

    function renderTask(idx) {
        const task = tasks[idx];
        const alreadyAnswered = answersState[idx] !== undefined;
        let feedbackHtml = '';
        let disabled = false;

        if (alreadyAnswered) {
            const isCorrect = answersState[idx];
            disabled = true;
            feedbackHtml = `
                <div class="feedback ${isCorrect ? 'correct-feedback' : 'wrong-feedback'}">
                    ${isCorrect ? '✅ Верно! ' + task.hint : '❌ Неверно. ' + task.hint}
                </div>
            `;
        }

        let optionsHtml = `<div class="options">`;
        for (let opt of task.opts) {
            optionsHtml += `<button class="opt-btn" data-opt="${opt}" ${disabled ? 'disabled' : ''}>${opt}</button>`;
        }
        optionsHtml += `</div>`;

        let nextButtonHtml = '';
        if (alreadyAnswered) {
            nextButtonHtml = `<button class="next-btn" id="nextTaskBtn">➡ Дальше</button>`;
        }

        const html = `
            <div class="task-card">
                <div class="task-question">${task.q}</div>
                ${optionsHtml}
                ${feedbackHtml}
                ${nextButtonHtml}
            </div>
        `;
        contentDiv.innerHTML = html;

        if (!alreadyAnswered) {
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answersState[idx] !== undefined) return;
                    const chosen = btn.getAttribute('data-opt');
                    const isCorrect = (chosen === task.correct);
                    answersState[idx] = isCorrect;
                    if (isCorrect) {
                        totalScore += 20;
                        updateUI();
                    }
                    renderTask(idx);
                });
            });
        } else {
            const nextBtn = document.getElementById('nextTaskBtn');
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    currentTask++;
                    render();
                    updateUI();
                });
            }
        }
        updateUI();
    }

    function showFinalScreen() {
        const maxScore = tasks.length * 20;
        const earned = totalScore;
        let message = '';
        if (earned === maxScore) {
            message = '🎉 Отлично! Вы знаете главные правила здоровья. Так держать! 🎉';
        } else if (earned >= maxScore - 40) {
            message = '👍 Хорошо! Повторите правила гигиены и будет ещё лучше.';
        } else {
            message = '📚 Пройдите игру ещё раз и запомните полезные привычки.';
        }
        const finalHtml = `
            <div class="final-screen">
                <h2>Ваш результат</h2>
                <div class="final-score">${earned} / ${maxScore}</div>
                <p style="font-size:1.2rem;">${message}</p>
                <button class="restart-btn" id="restartGameBtn">🔄 Пройти заново</button>
            </div>
        `;
        contentDiv.innerHTML = finalHtml;
        document.getElementById('restartGameBtn')?.addEventListener('click', () => {
            currentTask = 0;
            totalScore = 0;
            answersState = [];
            render();
            updateUI();
        });
    }

    render();
    updateUI();
</script>
</body>
</html>
