                { q: "Если незнакомец в мессенджере просит перевести деньги за «освобождение друга из полиции», это...", opts: ["Реальная помощь", "Мошенничество и вымогательство", "Благотворительность"], correctIdx: 1, exp: "Мошенники используют фейковые истории, чтобы выманить деньги." },
                { q: "Что делать, если тебе пришло сообщение от имени известного блогера с просьбой перейти по ссылке?", opts: ["Перейти и посмотреть", "Игнорировать, не переходить, проверить через официальный аккаунт", "Отправить ссылку друзьям"], correctIdx: 1, exp: "Фишинг. Никогда не переходи по подозрительным ссылкам." }
            ],
            finalPerfect: "🎉 Идеально! Ты ни разу не дал себя обмануть!",
            finalGood: "👍 Хорошо! Но будь внимательнее.",
            finalBad: "📚 Попробуй ещё раз. Не дай себя обмануть!",
            restartBtn: "🔄 Пройти заново",
            nextBtn: "➡ Дальше",
            demoNext: "Далее →",
            phaseIntro: "Вступление",
            phaseDemo: "Диалог",
            phaseGame: "Ситуация",
            phasePractice: "Манипуляции",
            phaseFinal: "Результат"

        en: {
            gameTitle: "Stop! Don't let yourself be deceived",
            intro: [
                { title: "🚨 Be careful!", text: "There are many scammers online trying to involve teens in crimes (arson, explosions). They use messengers, promise money or threaten. Our game teaches you to recognize these schemes." },
                { title: "⚖️ What's at stake?", text: "Scammers promise easy money or 'helping the investigation'. In reality, the teen becomes a criminal defendant. Responsibility from age 14.", list: ["Criminal liability (Art. 167, 205 of RF Criminal Code)", "Real prison sentence", "Fines up to millions of rubles"] },
                { title: "🎮 How to play?", text: "First we analyze a scammer's dialogue. Then 4 real situations – choose the right answer. Then 6 manipulation recognition tasks. Finally – a useful memo. Score points and stay safe!" }
            ],
            demo: [

                { type: "left", text: "Don't be afraid. If you don't help, you'll be arrested. This is a secret operation." },
                { type: "right", text: "I'm scared. But I know the rule: a stranger demanding a crime is a scammer. I'll tell my parents and call 102." },

            scenarios: [
                { title: "🔥 Call from 'investigator'", msg: "A 'policeman' writes: 'Your friend is involved in a terrorist attack. Help the investigation – set the ATM on fire.' What to do?", opts: ["Run with a lighter", "Demand a meeting at the police station and tell parents", "Transfer money"], correctIdx: 1, explain: "✅ A real investigator wouldn't ask a teen to commit arson. You broke off the dialogue and told adults.", wrongExpl: ["❌ You committed arson – up to 20 years in prison.", "❌ The scammer will rob and continue blackmail."] },
                { title: "💔 'Girl' from social media", msg: "A pretty girl writes: 'Make a video for my blog – set a gas station on fire. I'll give 30,000 rubles and we'll meet. Don't tell anyone!'", opts: ["Agree (money and a girl!)", "Offer a real meeting, if refused – block and tell parents", "Ask for intimate photos"], correctIdx: 1, explain: "✅ The scammer won't agree to a meeting. You figured him out.", wrongExpl: ["❌ Real cases: teens set fires and were arrested.", "❌ Intimate photos are used for blackmail."] },
                { title: "💰 Easy money", msg: "Online ad: 'Throw a Molotov cocktail at an ATM – get 50,000 rubles instantly on your card.' Your actions?", opts: ["Agree, I need money", "Ignore, block, report", "Ask for 50% prepayment"], correctIdx: 1, explain: "✅ You didn't fall for easy money. Those trying to involve you lose interest.", wrongExpl: ["❌ Article 205 of the Criminal Code – up to 20 years in prison.", "❌ You can't fool criminals – they'll record the refusal."] },
                { title: "😨 Threat to loved ones", msg: "Stranger: 'If you don't blow up the ATM by 7 PM, we'll kill your mother. Don't call anyone!'", opts: ["Panic and run to blow up", "Immediately call mom, then police 102", "Ask for proof"], correctIdx: 1, explain: "✅ 99% of threats are fake. Police will track them by IP. You saved yourself and family.", wrongExpl: ["❌ You'll commit a terrorist act, and mom won't be touched.", "❌ Discussing gives leverage. Block and tell adults."] }

            manipulations: [

            qCurrentSpan.innerText = gameState.demoStep+1;

            phaseLabelSpan.innerText = langData[currentLang].phaseGame;
            qTotalSpan.innerText = langData[currentLang].scenarios.length;
            qCurrentSpan.innerText = gameState.gameIdx+1;
        } else if (gameState.phase === "practice") {
            phaseLabelSpan.innerText = langData[currentLang].phasePractice;
            qTotalSpan.innerText = langData[currentLang].manipulations.length;
            qCurrentSpan.innerText = gameState.practiceIdx+1;
        } else {
            phaseLabelSpan.innerText = langData[currentLang].phaseFinal;
            qTotalSpan.innerText = "?";
        }
    }

    function shuffleWithMapping(originalOpts, correctOriginalIdx) {
        let items = originalOpts.map((text, idx) => ({ text, originalIdx: idx }));
        for (let i = items.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [items[i], items[j]] = [items[j], items[i]];
        }
        const shuffledTexts = items.map(item => item.text);
        const newCorrectIdx = items.findIndex(item => item.originalIdx === correctOriginalIdx);
        return { shuffledTexts, newCorrectIdx };
    }

    function prepareShuffledData() {
        const scenarios = langData[currentLang].scenarios;
        const mans = langData[currentLang].manipulations;
        gameState.gameChoicesShuffled = [];
        for (let i = 0; i < scenarios.length; i++) {
            gameState.gameChoicesShuffled.push(shuffleWithMapping(scenarios[i].opts, scenarios[i].correctIdx));
        }
        gameState.practiceChoicesShuffled = [];
        for (let i = 0; i < mans.length; i++) {
            gameState.practiceChoicesShuffled.push(shuffleWithMapping(mans[i].opts, mans[i].correctIdx));
        }
    }

    function render() {
        if (gameState.phase === "intro") renderIntro();
        else if (gameState.phase === "demo") renderDemo();
        else if (gameState.phase === "game") renderScenario();
        else if (gameState.phase === "practice") renderManipulation();
        else renderFinal();
        updateUI();
    }

    function renderIntro() {
        const introArr = langData[currentLang].intro;
        if (gameState.introIdx >= introArr.length) {
            gameState.phase = "demo";
            gameState.demoStep = 0;
            render();
            return;
        }
        const slide = introArr[gameState.introIdx];
        let html = `<div class="intro-slide"><h2>${slide.title}</h2><p>${slide.text}</p>`;
        if (slide.list) {
            html += `<ul>${slide.list.map(li => `<li>• ${li}</li>`).join('')}</ul>`;
        }
        html += `<button class="next-btn" id="introNext">${langData[currentLang].nextBtn}</button></div>`;
        contentDiv.innerHTML = html;
        document.getElementById("introNext")?.addEventListener("click", () => {
            gameState.introIdx++;
            render();
        });
    }

    function renderDemo() {
        const demoArr = langData[currentLang].demo;
        if (gameState.demoStep >= demoArr.length) {
            gameState.phase = "game";
            gameState.gameIdx = 0;
            gameState.gameAnswered = false;
            prepareShuffledData();
            render();
            return;
        }
        let chatHtml = `<div class="intro-slide"><h2>📱 Разбор диалога</h2><div class="chat-window">`;
        for (let i = 0; i <= gameState.demoStep; i++) {
            let msg = demoArr[i];
            if (msg.type === "left") chatHtml += `<div class="message message-left">${msg.text}</div>`;
            else if (msg.type === "right") chatHtml += `<div class="message message-right">${msg.text}</div>`;
            else chatHtml += `<div class="system-message">${msg.text}</div>`;
        }
        chatHtml += `</div><div class="chat-controls"><button class="chat-next-btn" id="demoNext">${langData[currentLang].demoNext}</button></div></div>`;
        contentDiv.innerHTML = chatHtml;
        document.getElementById("demoNext")?.addEventListener("click", () => {
            gameState.demoStep++;
            render();
        });
    }

    function renderScenario() {
        const scenarios = langData[currentLang].scenarios;
        if (gameState.gameIdx >= scenarios.length) {
            gameState.phase = "practice";
            gameState.practiceIdx = 0;
            gameState.practiceAnswers = new Array(scenarios.length).fill(undefined);
            render();
            return;
        }
        const sc = scenarios[gameState.gameIdx];
        const shuffled = gameState.gameChoicesShuffled[gameState.gameIdx];
        const answered = (gameState.gameAnswered !== undefined && gameState.gameAnswered !== false);
        let feedbackHtml = "";
        if (answered) {
            const isCorrect = (gameState.gameAnswered === shuffled.newCorrectIdx);
            if (isCorrect) {
                gameState.score = Math.min(gameState.score + 1, gameState.maxScore);
                feedbackHtml = `<div class="feedback" style="border-left-color:#2ecc71;">${sc.explain}</div>`;
            } else {
                feedbackHtml = `<div class="feedback" style="border-left-color:#e74c3c;">${sc.wrongExpl[gameState.gameAnswered] || "❌ Неверно. " + sc.explain}</div>`;
            }
        }
        let optsHtml = `<div class="options">`;
        shuffled.shuffledTexts.forEach((opt, idx) => {
            optsHtml += `<button class="option-btn" data-opt="${idx}" ${answered ? "disabled" : ""}>${opt}</button>`;
        });
        optsHtml += `</div>`;
        let nextBtn = answered ? `<button class="next-btn" id="nextTaskBtn">${langData[currentLang].nextBtn}</button>` : "";
        let html = `<div class="scenario"><h2>${sc.title}</h2><div class="message-text">📨 ${sc.msg}</div>${optsHtml}${feedbackHtml}${nextBtn}</div>`;
        contentDiv.innerHTML = html;
        if (!answered) {
            document.querySelectorAll(".option-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    if (gameState.gameAnswered !== false) return;
                    let choice = parseInt(btn.dataset.opt);
                    gameState.gameAnswered = choice;
                    render();
                });
            });
        } else {
            document.getElementById("nextTaskBtn")?.addEventListener("click", () => {
                gameState.gameIdx++;
                gameState.gameAnswered = false;
                render();
            });
        }
    }

    function renderManipulation() {
        const manipulations = langData[currentLang].manipulations;
        if (gameState.practiceIdx >= manipulations.length) {
            gameState.phase = "final";
            render();
            return;
        }
        const mn = manipulations[gameState.practiceIdx];
        const shuffled = gameState.practiceChoicesShuffled[gameState.practiceIdx];
        const answered = (gameState.practiceAnswers[gameState.practiceIdx] !== undefined);
        let feedbackHtml = "";
        if (answered) {
            const isCorrect = gameState.practiceAnswers[gameState.practiceIdx];
            if (isCorrect) {
                gameState.score = Math.min(gameState.score + 1, gameState.maxScore);
                feedbackHtml = `<div class="feedback" style="border-left-color:#2ecc71;">✅ ${mn.exp}</div>`;
            } else {
                feedbackHtml = `<div class="feedback" style="border-left-color:#e74c3c;">❌ Неверно. ${mn.exp}</div>`;
            }
        }
        let optsHtml = `<div class="manipulation-options">`;
        shuffled.shuffledTexts.forEach((opt, idx) => {
            optsHtml += `<button class="manip-btn" data-man="${idx}" ${answered ? "disabled" : ""}>${opt}</button>`;
        });
        optsHtml += `</div>`;
        let nextBtn = answered ? `<button class="next-btn" id="nextManipBtn">${langData[currentLang].nextBtn}</button>` : "";
        let html = `<div class="manipulation-card"><div class="manipulation-question">${mn.q}</div>${optsHtml}${feedbackHtml}${nextBtn}</div>`;
        contentDiv.innerHTML = html;
        if (!answered) {
            document.querySelectorAll(".manip-btn").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    let choice = parseInt(btn.dataset.man);
                    let isCorrect = (choice === shuffled.newCorrectIdx);
                    gameState.practiceAnswers[gameState.practiceIdx] = isCorrect;
                    render();
                });
            });
        } else {
            document.getElementById("nextManipBtn")?.addEventListener("click", () => {
                gameState.practiceIdx++;
                render();
            });
        }
    }

    function renderFinal() {
        let msg = "";
        if (gameState.score === gameState.maxScore) msg = langData[currentLang].finalPerfect;
        else if (gameState.score >= gameState.maxScore - 3) msg = langData[currentLang].finalGood;
        else msg = langData[currentLang].finalBad;
        let html = `<div class="final-screen">
            <h2>🏆 ${langData[currentLang].phaseFinal}</h2>
            <div class="final-score">${gameState.score} / ${gameState.maxScore}</div>
            <p>${msg}</p>
            <div class="bright-rules">
                <p>📌 Главные правила безопасности:</p>
                <p>• Не доверяй незнакомцам в интернете</p>
                <p>• При угрозах или странных просьбах — сразу сообщи родителям</p>
                <p>• Звони 102 — полиция поможет</p>
                <p>• Делай скриншоты переписки</p>
            </div>
            <button class="restart-btn" id="restartGame">${langData[currentLang].restartBtn}</button>
        </div>`;
        contentDiv.innerHTML = html;
        document.getElementById("restartGame")?.addEventListener("click", () => {
            resetGame();
        });
    }

    function resetGame() {
        gameState = {
            phase: "intro",
            introIdx: 0,
            demoStep: 0,
            gameIdx: 0,
            practiceIdx: 0,
            score: 0,
            maxScore: langData.ru.scenarios.length + langData.ru.manipulations.length,
            gameAnswered: false,
            gameChoicesShuffled: [],
            practiceChoicesShuffled: [],
            practiceAnswers: []
        };
        render();
    }

    function initSDK() {
        if (typeof YaGames !== "undefined") {
            YaGames.init().then(ysdk => {
                window.ysdk = ysdk;
                ysdk.features.LoadingAPI?.ready();
                const env = ysdk.getEnvironment();
                if (env && env.i18n && env.i18n.lang) {
                    if (env.i18n.lang === "en") currentLang = "en";
                    else currentLang = "ru";
                }
                gameTitleElem.innerText = langData[currentLang].gameTitle;
                if (ysdk.features && ysdk.features.GameReadyAPI) {
                    ysdk.features.GameReadyAPI.gameReady();
                }
                render();
            }).catch(err => {
                console.warn("SDK error", err);
                render();
            });
        } else {
            render();
        }
    }

    initSDK();
</script>
</body>
</html>
